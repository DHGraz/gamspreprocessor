stages:
  - test
  - lint
  - nightly-test

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

cache:
  key:
    files:
      - uv.lock
  paths:
    - .uv-cache

# run on any push
pytest:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: always
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  script:
    - uv python install $PYTHON_VERSION
    - uv run --python $PYTHON_VERSION pytest

# Linting (Ruff normally only needs one python version): run on any push 
lint-ruff:
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: always
  script:
    - uv run ruff check src



# Nightly matrix: force fresh environments and dependency upgrades
nightly-pytest:
  stage: nightly-test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - when: never
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  script:
    - uv python install $PYTHON_VERSION
    - uv run --python $PYTHON_VERSION pytest


