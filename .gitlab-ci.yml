stages:
  - test
  - lint
  - nightly-test
  - tag
  - publish

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

cache:
  key:
    files:
      - uv.lock
  paths:
    - .uv-cache

# run on any push
pytest:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: always
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  script:
    - uv python install $PYTHON_VERSION
    - uv run --python $PYTHON_VERSION pytest

# Linting (Ruff normally only needs one python version): run on any push 
lint-ruff:
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: always
  script:
    - uv run ruff check src



# Nightly matrix: force fresh environments and dependency upgrades
nightly-pytest:
  stage: nightly-test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - when: never
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  script:
    - uv python install $PYTHON_VERSION
    - uv run --python $PYTHON_VERSION pytest


# Reads the version from pyproject.toml and creates a git tag if it does not
# already exist. Runs only on pushes to main (not on scheduled pipelines).
auto-tag:
  stage: tag
  image:
    name: alpine/git:latest
    entrypoint: [""]
  before_script: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE != "schedule"
      when: always
    - when: never
  script:
    - VERSION=$(awk -F ' = ' '/^\[project\]/{in_project=1; next} /^\[/{in_project=0} in_project && /^version = / {gsub(/"/, "", $2); print $2; exit}' pyproject.toml)
    - TAG="v${VERSION}"
    - echo "Detected version ${TAG}"
    - |
      ALL_TAGS=$(git ls-remote --tags origin)
      echo All tags: ${ALL_TAGS}
      if echo "${ALL_TAGS}" | grep -q "refs/tags/${TAG}$"; then
        echo "Tag ${TAG} already exists, nothing to do"
      else
        echo "Creating tag ${TAG}"
        git config user.email "ci@gitlab"
        git config user.name "GitLab CI"
        git tag "${TAG}"
        if [ -n "${GIT_PUSH_TOKEN}" ]; then
          PUSH_URL="https://oauth2:${GIT_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        else
          PUSH_URL="https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        fi
        git push "${PUSH_URL}" "${TAG}" || {
          echo "Tag push failed: configure GIT_PUSH_TOKEN (Project Access Token with write_repository)"
          echo "or enable CI_JOB_TOKEN push rights in project settings."
          exit 1
        }
      fi

# Builds the package and publishes it to PyPI whenever a vX.Y.Z tag is pushed.
# Requires a PYPI_TOKEN CI/CD variable set in the project's GitLab settings.
publish-to-pypi:
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
      when: always
    - when: never
  script:
    - rm -rf .uv-cache .venv
    - echo "Building package"
    - uv build
    - echo "Publishing version ${CI_COMMIT_TAG} to PyPI"
    - uv publish --token "${CI_JOB_TOKEN}"