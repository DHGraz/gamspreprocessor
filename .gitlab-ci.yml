stages:
  - test
  - lint
  - nightly-test
  - tag-and-publish
  
  

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

cache:
  key:
    files:
      - uv.lock
  paths:
    - .uv-cache

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: always
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - when: never
    
# run on any push
pytest:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: always
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  script:
    - uv python install $PYTHON_VERSION
    - uv run --python $PYTHON_VERSION pytest

# Linting (Ruff normally only needs one python version): run on any push 
lint-ruff:
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: always
  script:
    - uv run ruff check src



# Nightly matrix: force fresh environments and dependency upgrades
nightly-pytest:
  stage: nightly-test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - when: never
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  script:
    - echo "uv environment version"
    - uv --version
    - echo "Forcing fresh install and upgraded dependencies"
    - rm -rf .venv
    - uv cache clean
    - uv sync --python $PYTHON_VERSION --upgrade
    - echo "Using python version:"
    - uv run --python $PYTHON_VERSION python --version
    - echo "Running tests with uv"
    - uv run --python $PYTHON_VERSION pytest tests
    - uv python install $PYTHON_VERSION
    - uv run --python $PYTHON_VERSION pytest




auto-tag-and-publish:
  stage: tag-and-publish
  image:
    name: alpine/git:latest
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE != "schedule"
      when: always
    - when: never  
  script:
    - apk add --no-cache python3 py3-pip curl
    - pip install uv
    
    - VERSION_RAW=$(awk -F ' = ' '/^\[project\]/{in_project=1; next} /^\[/{in_project=0} in_project && /^version = / {gsub(/"/, "", $2); print $2; exit}' pyproject.toml)
    - TAG="v${VERSION_RAW}"
    - echo "Detected tag='$TAG'"
    # check if tag already exists
    - |
      if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
        echo "Tag ${TAG} already exists, nothing to do"
      else
        echo "Creating tag ${TAG}"
        git config user.email "ci@gitlab"
        git config user.name "GitLab CI"
        git tag "${TAG}"
        # if we have an explicit token, use this, otherwise use the autimatically generated CI token
        if [ -n "${GIT_PUSH_TOKEN}" ]; then
          echo "Using GIT_PUSH_TOKEN for authentication"
          PUSH_URL="https://oauth2:${GIT_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        else
          echo "Using CI_JOB_TOKEN for authentication"
          PUSH_URL="https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        fi
        git push "${PUSH_URL}" "${TAG}" || {
          echo "Tag push failed: configure GIT_PUSH_TOKEN (Project Access Token with write_repository)"
          echo "or enable CI_JOB_TOKEN push rights in project settings."
          exit 1
        }
      fi
    - rm -rf .uv-cache .venv
    - echo "Building package"
    - uv build
    - echo "Publishing ${TAG} to PyPI"
    - uv publish --token "${UV_PUBLISH_TOKEN}"

