name: Build and Deploy Documentation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Zensical
        run: |
          pip install --upgrade pip
          pip install zensical==0.0.46  mkdocstrings-python==2.0.5 

      - name: Build English docs
        run: zensical build -c -f docs/en/zensical.toml

      - name: Build German docs
        run: zensical build -c -f docs/de/zensical.toml

      - name: Assemble Pages artifact
        run: |
          mkdir -p _pages/de _pages/en
          cp -a docs/de/site/. _pages/de/
          cp -a docs/en/site/. _pages/en/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _pages

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5