name: Build and Deploy Documentation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install zensical==0.0.46  mkdocstrings-python==2.0.5 

      - name: Build English docs
        run: zensical build -c -f docs/en/zensical.toml

      - name: Build German docs
        run: zensical build -c -f docs/de/zensical.toml

      - name: Assemble Pages artifact
        run: |
          mkdir -p _pages/de _pages/en
          cp -a docs/de/site/. _pages/de/
          cp -a docs/en/site/. _pages/en/
          touch _pages/.nojekyll
          cat > _pages/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=de/">
              <title>gamspreprocessor</title>
            </head>
            <body>
              <p>Redirecting to <a href="de/">German documentation</a>.</p>
              <p><a href="en/">English documentation</a></p>
            </body>
          </html>
          EOF
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5