name: Build and Deploy Documentation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zensical
        run: |
          pip install --upgrade pip
          pip install zensical==0.0.46  

#      - name: Build English docs
#        run: zensical build -c -f docs/en/zensical.toml

      - name: Build German docs
        run: zensical build -c -f docs/de/zensical.toml

      # At this point "site/" should contain both "en/" and "de/" folders

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site  # directory containing en/ and de/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4