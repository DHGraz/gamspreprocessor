# ============================================================================
#
# The configuration produced by default is meant to highlight the features
# that Zensical provides and to serve as a starting point for your own
# projects.
#
# ============================================================================

[project]

# The site_name is shown in the page header and the browser window title
site_name = "gamspreprocessor"

# The site_description is included in the HTML head and should contain a
# meaningful description of the site content for use by search engines.
site_description = "Werkzeuge zum Erstellen von GAMS (5+) Objektordnern als Vorstufe von SIP-Paketen"

# Read more: https://zensical.org/docs/setup/basics/#site_author
site_author = "Gunter Vasold"

# The site_url is the canonical URL for your site. When building online
# documentation you should set this.
#site_url = "https://dhgraz.github.io/gamspreprocessor/de/"

# The copyright notice appears in the page footer and can contain an HTML
# fragment.
#
# Read more: https://zensical.org/docs/setup/basics/#copyright
copyright = ""

#docs_dir = "docs/"
#site_dir = "site/de/"




nav = [
  {"Überblick" = "index.md"},
  {"Installation" = "installation.md"},
  {"Projektkonfiguration" = "configuration.md"},
  {
  "Befehlsreferenz" = [
        "command-reference/gamspreprocessor.md",
        {
          "Unterbefehle" = [
              {"project" = "command-reference/subcommands/project.md"},
              {"csv" =  "command-reference/subcommands/csv.md"},
              {"transform" = "command-reference/subcommands/transform.md"},
              {"multitransform" = "command-reference/subcommands/multitransform.md"},
              {"splitproject" = "command-reference/subcommands/splitproject.md"},
              {"gams3export" = "command-reference/subcommands/gams3export.md"}
          ]
        },
        {
          "Dateien" = [
              {"gamsproject.toml" = "command-reference/files/gamsproject.toml.md"},
              {"DC.xml" = "command-reference/files/dc.xml.md"},
              {"object.csv" = "command-reference/files/object.csv.md"},
              {"datastreams.csv" = "command-reference/files/datastreams.csv.md"}
          ]
        }
    ]
  },
  {
    "Tutorials" = [
          #"tutorials/index.md",
          {"Empfohlene Workflows" = "tutorials/workflows.md"},
          {"Projekt anlegen" = "tutorials/project.md"},
          {"Objekverzeichnisse erzeugen" = [
            {"Intro: Objektverzeichnisse" = "tutorials/object_dirs_intro.md"},
            {"Selbst erstellen" = "tutorials/objdir_from_scratch.md"},
            {"Export aus GAMS3" = "tutorials/objectdir_gams3.md"},
            {"Aus bestehenden Verzeichnissen" = "tutorials/objectdir_splitproject.md"},
            ]
          },
          {"CSV-Daten einbinden" = "tutorials/csv.md"},
          {"Daten transformieren" = "tutorials/transform.md"},
          {"multitransform" = "tutorials/multitransform.md"}
    ] 
  },
  {
    "How to" = [
        {"Überblick" = "how-to/index.md"}
    ]
  },
  {
    "API Referenz" = [
      {"Überblick" = "api/index.md"},
      {"project" = "api/project.md"},
      {"objectcsv" = "api/objectcsv.md"},
      {"transformers" = "api/transformers.md"},
      {"gams3" = "api/gams3.md"},
      {"splitproject" = "api/splitproject.md"}
    ]
  }
]




#favicon = "images/favicon.png"

# Zensical supports more than 60 different languages. This means that the
# labels and tooltips that Zensical's templates produce are translated.
# The "language" option allows you to set the language used. This language
# is also indicated in the HTML head element to help with accessibility
# and guide search engines and translation tools.
#
# The default language is "en" (English). It is possible to create
# sites with multiple languages and configure a language selector. See
# the documentation for details.
#
# Read more:
# - https://zensical.org/docs/setup/language/
#
language = "de"

[project.extra]
alternate = [
    { name = "English", link = "/gamspreprocessor/en/", lang = "en" },
    { name = "Deutsch", link = "/gamspreprocessor/de/", lang = "de" }
  ]

# ----------------------------------------------------------------------------
# You can configure your own logo to be shown in the header using the "logo"
# option in the "theme" subsection. The logo must be a relative path to a file
# in your "docs_dir", e.g., to use `docs/assets/logo.png` you would set:
# ----------------------------------------------------------------------------
#logo = "assets/logo.png"


# ----------------------------------------------------------------------------
# In the "palette" subsection you can configure options for the color scheme.
# You can configure different color schemes, e.g., to turn on dark mode,
# that the user can switch between. Each color scheme can be further
# customized.
#
# Read more:
# - https://zensical.org/docs/setup/colors/
# ----------------------------------------------------------------------------
[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# The "extra" section contains miscellaneous settings.
# ----------------------------------------------------------------------------
#[[project.extra.social]]
#icon = "fontawesome/brands/github"
#link = "https://github.com/user/repo"

# ----------------------------------------------------------------------------
# In this section you can configure the Markdown extensions that are used when
# rendering your documentation. We enable the most useful extensions by default,
# but you can customize this list to your needs.
#
# Read more:
# - https://zensical.org/docs/setup/extensions/
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]


[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false
members_order = "source"
separate_signature = true
unwrap_annotated = true
filters = ["!^_"]
merge_init_into_class = true
docstring_section_style = "spacy"
signature_crossrefs = true
show_symbol_type_heading = true
show_symbol_type_toc = true
show_root_heading = true
show_if_no_docstring = true
